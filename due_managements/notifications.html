<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#0f172a">
    <title>Notifications | JackDev</title>

    <!-- Preconnect & Preload for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap">

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com">
    </script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0f3b3a',
                        'primary-light': '#1e6b68',
                        'primary-dark': '#092c2b',
                        accent: '#d4af37',
                        danger: '#e53e3e',
                        success: '#2c7a4d',
                        warning: '#dd6b20',
                        info: '#3182ce',
                    },
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', 'Segoe UI', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap');

        * {
            transition: background-color 0.2s cubic-bezier(0.2, 0, 0, 1), border-color 0.2s ease;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #f5f7fb;
        }
        .dark body {
            background: #111827;
        }

        /* Skeleton Loader */
        .skeleton {
            background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }
        .dark .skeleton {
            background: linear-gradient(90deg, #2d3748 25%, #4a5568 50%, #2d3748 75%);
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .notification-item {
            background: white;
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 10px;
            border: 1px solid #e5e7eb;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .dark .notification-item {
            background: #1f2937;
            border-color: #374151;
        }
        .notification-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.06);
        }
        .dark .notification-item:hover {
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }
        .notification-item .notif-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        .notification-item .notif-icon.due {
            background: #fee2e2;
            color: #dc2626;
        }
        .notification-item .notif-icon.collection {
            background: #dcfce7;
            color: #16a34a;
        }
        .dark .notification-item .notif-icon.due {
            background: #450a0a;
            color: #f87171;
        }
        .dark .notification-item .notif-icon.collection {
            background: #052e16;
            color: #4ade80;
        }
        .notification-item .notif-content {
            flex: 1;
            min-width: 0;
        }
        .notification-item .notif-content .notif-title {
            font-size: 14px;
            font-weight: 600;
            color: #1f2937;
        }
        .dark .notification-item .notif-content .notif-title {
            color: #f1f5f9;
        }
        .notification-item .notif-content .notif-desc {
            font-size: 12px;
            color: #6b7280;
            margin-top: 1px;
        }
        .dark .notification-item .notif-content .notif-desc {
            color: #9ca3af;
        }
        .notification-item .notif-content .notif-time {
            font-size: 10px;
            color: #9ca3af;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 3px;
        }
        .dark .notification-item .notif-content .notif-time {
            color: #6b7280;
        }
        .notification-item .notif-amount {
            font-weight: 700;
            font-size: 15px;
            flex-shrink: 0;
            padding: 4px 12px;
            border-radius: 8px;
        }
        .notification-item .notif-amount.due {
            color: #dc2626;
            background: #fef2f2;
        }
        .notification-item .notif-amount.collection {
            color: #16a34a;
            background: #f0fdf4;
        }
        .dark .notification-item .notif-amount.due {
            color: #f87171;
            background: #450a0a;
        }
        .dark .notification-item .notif-amount.collection {
            color: #4ade80;
            background: #052e16;
        }

        .filter-btn {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid #d1d5db;
            background: white;
            color: #4b5563;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn:hover {
            border-color: #0f3b3a;
            color: #0f3b3a;
        }
        .filter-btn.active {
            background: #0f3b3a;
            color: white;
            border-color: #0f3b3a;
        }
        .dark .filter-btn {
            background: #1f2937;
            border-color: #4b5563;
            color: #9ca3af;
        }
        .dark .filter-btn:hover {
            border-color: #d4af37;
            color: #d4af37;
        }
        .dark .filter-btn.active {
            background: #0f3b3a;
            color: white;
            border-color: #0f3b3a;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            background: white;
            border: 1px solid #e5e7eb;
            color: #1f2937;
            transition: all 0.2s;
            text-decoration: none;
            cursor: pointer;
        }
        .dark .back-btn {
            background: #1f2937;
            border-color: #374151;
            color: #f1f5f9;
        }
        .back-btn:hover {
            background: #f3f4f6;
            transform: translateX(-2px);
        }
        .dark .back-btn:hover {
            background: #374151;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-track { background: #1e293b; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }

        /* Pagination */
        .pagination-btn {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            border: 1px solid #d1d5db;
            background: white;
            color: #4b5563;
            cursor: pointer;
            transition: all 0.2s;
        }
        .dark .pagination-btn {
            background: #1f2937;
            border-color: #4b5563;
            color: #9ca3af;
        }
        .pagination-btn:hover:not(:disabled) {
            background: #0f3b3a;
            color: white;
            border-color: #0f3b3a;
        }
        .dark .pagination-btn:hover:not(:disabled) {
            background: #0f3b3a;
            color: white;
            border-color: #0f3b3a;
        }
        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .pagination-btn.active {
            background: #0f3b3a;
            color: white;
            border-color: #0f3b3a;
        }
        .dark .pagination-btn.active {
            background: #0f3b3a;
            color: white;
            border-color: #0f3b3a;
        }

        .badge-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 22px;
            height: 22px;
            padding: 0 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
            background: #ef4444;
            color: white;
        }
        .dark .badge-count {
            background: #dc2626;
        }

        .filter-wrapper {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .notification-header {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            padding: 16px 20px;
        }
        .dark .notification-header {
            background: #1f2937;
            border-color: #374151;
        }

        .notification-body {
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-state i {
            font-size: 48px;
            color: #d1d5db;
            opacity: 0.4;
        }
        .dark .empty-state i {
            color: #4b5563;
        }
        .empty-state h3 {
            font-size: 18px;
            font-weight: 600;
            color: #1f2937;
            margin-top: 16px;
        }
        .dark .empty-state h3 {
            color: #f1f5f9;
        }
        .empty-state p {
            font-size: 13px;
            color: #6b7280;
            margin-top: 4px;
        }
        .dark .empty-state p {
            color: #9ca3af;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .toast {
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 500;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            animation: slideUp 0.3s ease-out;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .toast.success {
            background: #2c7a4d;
            color: white;
        }
        .toast.error {
            background: #dc2626;
            color: white;
        }
        .toast.info {
            background: #3182ce;
            color: white;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Header with Back Button -->
    <header class="notification-header sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <a href="dashboard.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Back to Dashboard
                </a>
                <div class="flex items-center gap-2">
                    <i class="fas fa-bell text-accent text-lg"></i>
                    <h1 class="text-lg font-bold text-gray-800 dark:text-white">Notifications</h1>
                    <span id="totalBadge" class="badge-count hidden">0</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button id="markAllReadBtn" class="text-xs font-medium text-primary dark:text-accent hover:underline transition px-3 py-1.5 rounded-lg hover:bg-primary/5 dark:hover:bg-accent/10">
                    <i class="fas fa-check-double mr-1"></i> Mark all read
                </button>
                <button id="refreshBtn" class="p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                    <i class="fas fa-sync-alt text-sm"></i>
                </button>
                <button id="darkModeToggle" class="p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition">
                    <i class="fas fa-moon dark:hidden text-sm"></i>
                    <i class="fas fa-sun hidden dark:inline-block text-sm"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Filter Bar -->
    <div class="max-w-4xl mx-auto px-4 pt-4 pb-2">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
            <div class="filter-wrapper">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="due">Due Added</button>
                <button class="filter-btn" data-filter="collection">Collections</button>
            </div>
            <div class="flex items-center gap-2 text-xs text-gray-500 dark:text-gray-400">
                <span>Showing <span id="showingCount">0</span> notifications</span>
            </div>
        </div>
    </div>

    <!-- Notifications List -->
    <div class="notification-body">
        <div id="notificationsContainer">
            <!-- Loading Skeleton -->
            <div class="space-y-3">
                <div class="skeleton" style="height: 70px; border-radius: 12px;"></div>
                <div class="skeleton" style="height: 70px; border-radius: 12px;"></div>
                <div class="skeleton" style="height: 70px; border-radius: 12px;"></div>
                <div class="skeleton" style="height: 70px; border-radius: 12px;"></div>
                <div class="skeleton" style="height: 70px; border-radius: 12px;"></div>
            </div>
        </div>

        <!-- Pagination -->
        <div class="flex justify-between items-center mt-6 pt-4 border-t border-gray-200 dark:border-gray-700">
            <div class="text-xs text-gray-500 dark:text-gray-400">
                Page <span id="currentPage">1</span> of <span id="totalPages">1</span>
            </div>
            <div class="flex gap-1">
                <button id="prevPage" class="pagination-btn" disabled>
                    <i class="fas fa-chevron-left text-[10px]"></i> Prev
                </button>
                <button id="nextPage" class="pagination-btn" disabled>
                    Next <i class="fas fa-chevron-right text-[10px]"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <script type="module">
        import { db, collection, getDocs, query, orderBy, limit, startAfter } from './js/firebase.js';

        let allNotifications = [];
        let filteredNotifications = [];
        let customerNameMap = new Map();
        let currentFilter = 'all';
        let currentPage = 1;
        const itemsPerPage = 20;
        let lastDoc = null;
        let isLoading = false;
        let hasMore = true;

        // ─── DOM Refs ───
        const container = document.getElementById('notificationsContainer');
        const prevBtn = document.getElementById('prevPage');
        const nextBtn = document.getElementById('nextPage');
        const currentPageEl = document.getElementById('currentPage');
        const totalPagesEl = document.getElementById('totalPages');
        const showingCount = document.getElementById('showingCount');
        const totalBadge = document.getElementById('totalBadge');
        const refreshBtn = document.getElementById('refreshBtn');
        const darkModeToggle = document.getElementById('darkModeToggle');
        const markAllReadBtn = document.getElementById('markAllReadBtn');

        // ─── Utilities ───
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[m]));
        }

        function formatTimeAgo(dateStr) {
            if (!dateStr) return 'Just now';
            const date = new Date(dateStr);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);
            if (diff < 60) return 'Just now';
            if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
            if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        // ─── Load Customer Names ───
        async function loadCustomerNames() {
            try {
                const snap = await getDocs(collection(db, 'customers'));
                customerNameMap.clear();
                snap.forEach(d => customerNameMap.set(d.id, d.data().name));
            } catch (e) {
                console.error('Error loading customer names:', e);
            }
        }

        function getCustomerName(id) {
            if (!id) return 'Unknown';
            return customerNameMap.get(id) || 'Unknown';
        }

        // ─── Load Notifications ───
        async function loadNotifications() {
            if (isLoading) return;
            isLoading = true;

            try {
                if (customerNameMap.size === 0) await loadCustomerNames();

                const q = query(
                    collection(db, 'transactions'),
                    orderBy('date', 'desc'),
                    limit(200)
                );

                const snap = await getDocs(q);
                const notifications = [];

                snap.forEach(d => {
                    const data = d.data();
                    if (data.type === 'due' || data.type === 'collection') {
                        const name = data.customerName || getCustomerName(data.customerId);
                        const isDue = data.type === 'due';
                        const amount = isDue ? (data.dueAmount || data.totalAmount || 0) : (data.collectionAmount || 0);
                        notifications.push({
                            id: d.id,
                            type: data.type,
                            customerName: name,
                            amount: amount,
                            date: data.date || 'N/A',
                            description: isDue ? 'Due added' : 'Collection received',
                            icon: isDue ? 'fa-plus-circle' : 'fa-hand-holding-usd',
                            iconClass: isDue ? 'due' : 'collection',
                            amountClass: isDue ? 'due' : 'collection',
                            details: isDue ? 
                                (data.products ? data.products.map(p => p.name).join(', ') : (data.productName || 'Direct Due')) :
                                (data.remarks || 'Payment received'),
                            timestamp: data.createdAt?.toDate?.()?.toISOString() || data.date || new Date().toISOString()
                        });
                    }
                });

                allNotifications = notifications;
                applyFilter(currentFilter);
                updateBadge();
                isLoading = false;

            } catch (e) {
                console.error('Error loading notifications:', e);
                showToast('Error loading notifications', 'error');
                isLoading = false;
            }
        }

        // ─── Apply Filter ───
        function applyFilter(filter) {
            currentFilter = filter;
            if (filter === 'all') {
                filteredNotifications = [...allNotifications];
            } else {
                filteredNotifications = allNotifications.filter(n => n.type === filter);
            }
            currentPage = 1;
            renderNotifications();
        }

        // ─── Render Notifications ───
        function renderNotifications() {
            const start = (currentPage - 1) * itemsPerPage;
            const end = Math.min(start + itemsPerPage, filteredNotifications.length);
            const pageData = filteredNotifications.slice(start, end);
            const totalPages = Math.ceil(filteredNotifications.length / itemsPerPage) || 1;

            // Update pagination info
            currentPageEl.textContent = currentPage;
            totalPagesEl.textContent = totalPages;
            showingCount.textContent = filteredNotifications.length;
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage >= totalPages;

            if (filteredNotifications.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="far fa-bell-slash"></i>
                        <h3>No notifications found</h3>
                        <p>${currentFilter === 'all' ? 'There are no transactions yet.' : `No ${currentFilter} notifications found.`}</p>
                    </div>
                `;
                return;
            }

            let html = '';
            for (const n of pageData) {
                const timeAgo = formatTimeAgo(n.timestamp);
                html += `
                    <div class="notification-item">
                        <div class="notif-icon ${n.iconClass}">
                            <i class="fas ${n.icon}"></i>
                        </div>
                        <div class="notif-content">
                            <div class="notif-title">${escapeHtml(n.customerName)}</div>
                            <div class="notif-desc">${escapeHtml(n.description)} — ${escapeHtml(n.details)}</div>
                            <div class="notif-time">
                                <i class="far fa-clock"></i> ${timeAgo}
                                <span class="mx-1 text-gray-300 dark:text-gray-600">|</span>
                                <i class="far fa-calendar-alt"></i> ${formatDate(n.date)}
                            </div>
                        </div>
                        <div class="notif-amount ${n.amountClass}">৳${n.amount.toFixed(2)}</div>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        // ─── Update Badge ───
        function updateBadge() {
            if (allNotifications.length > 0) {
                totalBadge.classList.remove('hidden');
                totalBadge.textContent = allNotifications.length;
            } else {
                totalBadge.classList.add('hidden');
            }
        }

        // ─── Mark All Read ───
        function markAllRead() {
            totalBadge.classList.add('hidden');
            showToast('All notifications marked as read', 'success');
        }

        // ─── Event Listeners ───

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                applyFilter(btn.dataset.filter);
            });
        });

        // Pagination
        prevBtn.addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderNotifications();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });

        nextBtn.addEventListener('click', () => {
            const totalPages = Math.ceil(filteredNotifications.length / itemsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                renderNotifications();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });

        // Mark all read
        markAllReadBtn.addEventListener('click', markAllRead);

        // Refresh
        refreshBtn.addEventListener('click', async () => {
            showToast('Refreshing...', 'info');
            await loadNotifications();
            showToast('Notifications refreshed', 'success');
        });

        // Dark Mode
        darkModeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            document.body.classList.toggle('dark');
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                refreshBtn.click();
            }
            if (e.key === 'Escape') {
                window.location.href = 'dashboard.html';
            }
        });

        // ─── Init ───
        await loadNotifications();

        console.log('🔔 Notifications page loaded with', allNotifications.length, 'notifications');

        // Auto-refresh every 30 seconds
        setInterval(async () => {
            await loadNotifications();
        }, 30000);

        // Check for new notifications in background
        setInterval(async () => {
            try {
                const q = query(
                    collection(db, 'transactions'),
                    orderBy('date', 'desc'),
                    limit(10)
                );
                const snap = await getDocs(q);
                let newCount = 0;
                snap.forEach(d => {
                    const data = d.data();
                    if (data.type === 'due' || data.type === 'collection') {
                        if (!allNotifications.some(n => n.id === d.id)) {
                            newCount++;
                        }
                    }
                });
                if (newCount > 0) {
                    await loadNotifications();
                    showToast(`${newCount} new notification${newCount > 1 ? 's' : ''}`, 'info');
                }
            } catch (e) {
                console.error('Background check error:', e);
            }
        }, 15000);
    </script>

</body>
</html>
