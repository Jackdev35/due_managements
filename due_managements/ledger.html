<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#009688">
    <title>Customer Ledger | JackDev Due Managements</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#009688',
                        'primary-dark': '#00796b',
                        danger: '#ef4444',
                        success: '#10b981',
                        warning: '#f59e0b',
                        info: '#3b82f6',
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-in {
            animation: slideIn 0.3s ease-out;
        }
        @media print {
            body * {
                visibility: hidden;
            }
            #ledgerCard, #ledgerCard * {
                visibility: visible;
            }
            #ledgerCard {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                margin: 0;
                padding: 1rem;
                box-shadow: none;
            }
            .no-print, .no-print * {
                display: none !important;
            }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-200">
    
    <div class="flex min-h-screen">
        
        <!-- Sidebar -->
        <aside class="fixed left-0 top-0 h-full w-64 bg-gradient-to-br from-slate-900 to-slate-800 shadow-xl z-50 transform -translate-x-full md:translate-x-0 transition-transform duration-300 overflow-y-auto" id="sidebar">
            <div class="flex flex-col h-full">
                <div class="flex items-center gap-3 px-5 py-5 border-b border-white/10">
                    <i class="fas fa-laptop-code text-primary text-xl"></i>
                    <span class="text-white font-semibold text-lg">JackDev Due Managements</span>
                </div>
                <nav class="flex-1 px-3 py-4 space-y-1">
                    <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:text-white hover:bg-white/10">
                        <i class="fas fa-tachometer-alt w-5"></i><span class="text-sm">Dashboard</span>
                    </a>
                    <a href="customers.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:text-white hover:bg-white/10">
                        <i class="fas fa-users w-5"></i><span class="text-sm">Customers</span>
                    </a>
                    <a href="due-entry.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:text-white hover:bg-white/10">
                        <i class="fas fa-plus-circle w-5"></i><span class="text-sm">Due Entry</span>
                    </a>
                    <a href="collection.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:text-white hover:bg-white/10">
                        <i class="fas fa-hand-holding-usd w-5"></i><span class="text-sm">Collection</span>
                    </a>
                    <a href="ledger.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-white bg-white/10">
                        <i class="fas fa-book w-5"></i><span class="text-sm">Customer Ledger</span>
                    </a>
                    <a href="backup.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:text-white     hover:bg-white/10">
                        <i class="fas fa-database w-5"></i><span class="text-sm">Backup & Restore</span>
                    </a>
                </nav>
                <div class="px-3 py-4 border-t border-white/10">
                    <a href="#" id="logoutLink" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:text-white hover:bg-red-500/20">
                        <i class="fas fa-sign-out-alt w-5"></i><span class="text-sm">Logout</span>
                    </a>
                </div>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="flex-1 md:ml-64 min-h-screen w-full">
            
            <!-- Top Header -->
            <header class="bg-white dark:bg-gray-800 shadow-sm border-b border-gray-200 dark:border-gray-700 sticky top-0 z-40 no-print">
                <div class="px-3 py-3 flex justify-between items-center">
                    <div class="flex items-center gap-2">
                        <button id="menuToggle" class="md:hidden text-gray-600 dark:text-gray-300 hover:text-primary p-2 -ml-2 rounded-lg">
                            <i class="fas fa-bars text-xl"></i>
                        </button>
                        <h2 class="text-base md:text-lg font-semibold text-gray-800 dark:text-white">
                            <i class="fas fa-book text-primary mr-2"></i>Customer Ledger
                        </h2>
                    </div>
                    <div class="flex items-center gap-1">
                        <button id="refreshBtn" class="p-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">
                            <i class="fas fa-sync-alt text-sm"></i>
                        </button>
                        <button id="darkModeToggle" class="p-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">
                            <i class="fas fa-moon dark:hidden text-sm"></i>
                            <i class="fas fa-sun hidden dark:inline-block text-sm"></i>
                        </button>
                    </div>
                </div>
            </header>
            
            <!-- Page Content -->
            <div class="p-3 md:p-4">
                
                <!-- Filter Section -->
                <div class="bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm overflow-hidden mb-4 no-print">
                    <div class="px-4 py-3 bg-gradient-to-r from-primary/10 to-transparent border-b border-gray-200 dark:border-gray-700">
                        <h3 class="text-sm md:text-base font-semibold text-gray-800 dark:text-white">
                            <i class="fas fa-filter text-primary mr-2"></i>Filter Ledger
                        </h3>
                    </div>
                    
                    <div class="p-4">
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
                            <div>
                                <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">
                                    <i class="fas fa-user text-primary mr-1"></i>Select Customer <span class="text-danger">*</span>
                                </label>
                                <select id="customerSelect" class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800">
                                    <option value="">-- Select Customer --</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">
                                    <i class="fas fa-calendar text-primary mr-1"></i>Start Date
                                </label>
                                <input type="date" id="startDate" class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1">
                                    <i class="fas fa-calendar text-primary mr-1"></i>End Date
                                </label>
                                <input type="date" id="endDate" class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800">
                            </div>
                            <div class="flex items-end">
                                <button id="viewLedgerBtn" class="w-full bg-primary hover:bg-primary-dark text-white font-medium py-2 rounded-lg transition-all flex items-center justify-center gap-2">
                                    <i class="fas fa-eye text-sm"></i> View Ledger
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Customer Info Card -->
                <div id="customerInfoCard" class="hidden bg-gradient-to-r from-primary to-primary-dark rounded-xl p-4 mb-4 text-white shadow-lg animate-slide-in no-print">
                    <div class="flex items-start justify-between flex-wrap gap-3">
                        <div>
                            <h3 class="text-sm font-semibold flex items-center gap-2">
                                <i class="fas fa-user-circle text-lg"></i> <span id="customerName"></span>
                            </h3>
                            <div class="flex flex-wrap gap-4 mt-2 text-sm">
                                <div><i class="fas fa-phone-alt text-xs mr-1"></i> <span id="customerPhone">-</span></div>
                                <div><i class="fas fa-map-marker-alt text-xs mr-1"></i> <span id="customerAddress">-</span></div>
                            </div>
                        </div>
                        <div class="bg-white/20 rounded-lg px-4 py-2 text-center">
                            <p class="text-[10px] opacity-80">Current Due</p>
                            <p class="text-xl font-bold" id="customerCurrentDue">৳0</p>
                        </div>
                    </div>
                </div>
                
                <!-- Ledger Card -->
                <div id="ledgerCard" class="hidden bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm overflow-hidden animate-slide-in">
                    <div class="px-4 py-3 bg-gradient-to-r from-primary/10 to-transparent border-b border-gray-200 dark:border-gray-700 flex justify-between items-center flex-wrap gap-2 no-print">
                        <h3 class="text-sm font-semibold text-gray-800 dark:text-white">
                            <i class="fas fa-history text-primary mr-2"></i>Transaction History
                        </h3>
                        <div class="flex gap-2">
                            <button id="exportBtn" class="text-xs bg-gray-100 dark:bg-gray-700 px-3 py-1.5 rounded-lg hover:bg-gray-200 transition"><i class="fas fa-download mr-1"></i>CSV</button>
                            <button id="printBtn" class="text-xs bg-gray-100 dark:bg-gray-700 px-3 py-1.5 rounded-lg hover:bg-gray-200 transition"><i class="fas fa-print mr-1"></i>Print</button>
                        </div>
                    </div>
                    
                    <div class="overflow-x-auto max-h-[450px] overflow-y-auto">
                        <table class="w-full min-w-[650px]" id="ledgerTable">
                            <thead class="bg-gray-50 dark:bg-gray-700/50 sticky top-0">
                                <tr>
                                    <th class="px-3 py-2 text-left text-[10px] font-semibold">Date</th>
                                    <th class="px-3 py-2 text-left text-[10px] font-semibold">Type</th>
                                    <th class="px-3 py-2 text-left text-[10px] font-semibold">Description</th>
                                    <th class="px-3 py-2 text-right text-[10px] font-semibold">Amount (৳)</th>
                                    <th class="px-3 py-2 text-right text-[10px] font-semibold">Balance (৳)</th>
                                </tr>
                            </thead>
                            <tbody id="ledgerTableBody" class="divide-y divide-gray-200 dark:divide-gray-700">
                                <tr><td colspan="5" class="text-center py-8 text-gray-500">Select a customer and click View Ledger</td<tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[100] hidden">
        <div class="bg-white dark:bg-gray-800 rounded-xl p-5 text-center">
            <i class="fas fa-spinner fa-pulse text-primary text-2xl mb-2"></i>
            <p>Loading...</p>
        </div>
    </div>
    
    <!-- Toast Container -->
    <div id="toastContainer" class="fixed bottom-4 right-4 z-50 no-print"></div>
    
    <script type="module">
        import { checkAuthState, logout } from './js/auth.js';
        import { db, collection, getDocs, getDoc, doc } from './js/firebase.js';
        
        checkAuthState();
        
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `mb-2 px-4 py-2 rounded-lg shadow-lg text-sm font-medium ${type === 'success' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} mr-2"></i>${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }
        
        async function loadCustomers() {
            try {
                const customersSnap = await getDocs(collection(db, 'customers'));
                const select = document.getElementById('customerSelect');
                select.innerHTML = '<option value="">-- Select Customer --</option>';
                
                if (customersSnap.empty) {
                    select.innerHTML = '<option value="">-- No customers found --</option>';
                } else {
                    customersSnap.forEach(docSnap => {
                        const customer = docSnap.data();
                        const option = document.createElement('option');
                        option.value = docSnap.id;
                        option.textContent = `${customer.name} - Due: ৳${(customer.totalDue || 0).toFixed(2)}`;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error("Error loading customers:", error);
                showToast('Error loading customers', 'error');
            }
        }
        
        function getTransactionAmount(trans) {
            if (trans.type === 'due') {
                if (trans.dueAmount !== undefined && trans.dueAmount !== null) {
                    return trans.dueAmount;
                }
                if (trans.totalAmount !== undefined && trans.paidAmount !== undefined) {
                    return trans.totalAmount - trans.paidAmount;
                }
                return trans.totalAmount || 0;
            } else if (trans.type === 'collection') {
                return trans.collectionAmount || 0;
            }
            return 0;
        }
        
        // Global variable to store closing balance for export
        let currentClosingBalance = 0;
        let currentCustomerName = '';
        
        async function viewLedger() {
            const customerId = document.getElementById('customerSelect').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            
            if (!customerId) {
                showToast('Please select a customer', 'error');
                return;
            }
            
            showLoading(true);
            
            try {
                const customerRef = doc(db, 'customers', customerId);
                const customerDoc = await getDoc(customerRef);
                
                if (!customerDoc.exists()) {
                    showToast('Customer not found', 'error');
                    showLoading(false);
                    return;
                }
                
                const customer = customerDoc.data();
                currentCustomerName = customer.name;
                
                document.getElementById('customerName').textContent = customer.name || 'N/A';
                document.getElementById('customerPhone').textContent = customer.phone || 'N/A';
                document.getElementById('customerAddress').textContent = customer.address || 'N/A';
                document.getElementById('customerCurrentDue').innerHTML = `৳${(customer.totalDue || 0).toFixed(2)}`;
                document.getElementById('customerInfoCard').classList.remove('hidden');
                
                const allTransSnap = await getDocs(collection(db, 'transactions'));
                let transactions = [];
                
                allTransSnap.forEach(docSnap => {
                    const trans = docSnap.data();
                    if (trans.customerId === customerId) {
                        transactions.push({ id: docSnap.id, ...trans });
                    }
                });
                
                const tbody = document.getElementById('ledgerTableBody');
                tbody.innerHTML = '';
                
                if (transactions.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-gray-500">No transactions found</td</tr>`;
                    document.getElementById('ledgerCard').classList.remove('hidden');
                    currentClosingBalance = 0;
                    showLoading(false);
                    return;
                }
                
                transactions.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
                
                let filteredTransactions = transactions;
                if (startDate) {
                    filteredTransactions = filteredTransactions.filter(t => t.date >= startDate);
                }
                if (endDate) {
                    filteredTransactions = filteredTransactions.filter(t => t.date <= endDate);
                }
                
                if (filteredTransactions.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center py-8 text-gray-500">No transactions in selected date range</td</tr>`;
                    document.getElementById('ledgerCard').classList.remove('hidden');
                    currentClosingBalance = 0;
                    showLoading(false);
                    return;
                }
                
                let runningBalance = 0;
                let totalDueAdded = 0;
                let totalCollected = 0;
                
                for (const trans of filteredTransactions) {
                    let description = '';
                    let amount = 0;
                    let amountClass = '';
                    let typeClass = '';
                    let typeIcon = '';
                    let typeText = '';
                    let displayAmount = '';
                    
                    if (trans.type === 'due') {
                        amount = getTransactionAmount(trans);
                        runningBalance += amount;
                        totalDueAdded += amount;
                        amountClass = 'text-red-600 dark:text-red-400';
                        typeClass = 'bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400';
                        typeIcon = 'fa-plus-circle';
                        typeText = 'Due Added';
                        displayAmount = `+ ৳${amount.toFixed(2)}`;
                        
                        if (trans.productName) {
                            description = `${trans.productName} (Qty: ${trans.qty || 1})`;
                            if (trans.paidAmount && trans.paidAmount > 0) {
                                description += ` | Paid: ৳${trans.paidAmount.toFixed(2)}`;
                            }
                        } else {
                            description = `Due Entry - Amount: ৳${amount.toFixed(2)}`;
                        }
                        
                    } else if (trans.type === 'collection') {
                        amount = getTransactionAmount(trans);
                        runningBalance -= amount;
                        totalCollected += amount;
                        amountClass = 'text-green-600 dark:text-green-400';
                        typeClass = 'bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400';
                        typeIcon = 'fa-hand-holding-usd';
                        typeText = 'Collection';
                        displayAmount = `- ৳${amount.toFixed(2)}`;
                        description = `Payment received${trans.remarks ? ' - ' + trans.remarks : ''}`;
                    }
                    
                    const balanceClass = runningBalance > 0 ? 'text-red-600 dark:text-red-400 font-bold' : '';
                    
                    const row = tbody.insertRow();
                    row.className = 'hover:bg-gray-50 dark:hover:bg-gray-700/50';
                    row.innerHTML = `
                        <td class="px-3 py-2 text-xs whitespace-nowrap">${trans.date || 'N/A'}</td>
                        <td class="px-3 py-2">
                            <span class="inline-flex items-center gap-1 px-2 py-1 rounded-lg text-xs font-medium ${typeClass}">
                                <i class="fas ${typeIcon} text-[10px]"></i> ${typeText}
                            </span>
                        </td>
                        <td class="px-3 py-2 text-xs text-gray-600 dark:text-gray-400 break-words">${escapeHtml(description)}</td>
                        <td class="px-3 py-2 text-right text-xs font-semibold ${amountClass} whitespace-nowrap">${displayAmount}</td>
                        <td class="px-3 py-2 text-right text-xs font-semibold ${balanceClass} whitespace-nowrap">৳${runningBalance.toFixed(2)}</td>
                    `;
                }
                
                // Store closing balance for export
                currentClosingBalance = runningBalance;
                
                // Add summary row
                const summaryRow = tbody.insertRow();
                summaryRow.className = 'bg-gray-100 dark:bg-gray-700/50 font-bold';
                summaryRow.innerHTML = `
                    <td colspan="3" class="px-3 py-2 text-right text-xs">Total Due: ৳${totalDueAdded.toFixed(2)} | Total Collected: ৳${totalCollected.toFixed(2)}</td>
                    <td class="px-3 py-2 text-right"></td>
                    <td class="px-3 py-2 text-right text-sm font-bold ${runningBalance > 0 ? 'text-red-600' : 'text-green-600'} whitespace-nowrap">Closing: ৳${runningBalance.toFixed(2)}</td>
                `;
                
                document.getElementById('ledgerCard').classList.remove('hidden');
                showToast(`✅ Balance: ৳${runningBalance.toFixed(2)} | ${filteredTransactions.length} transactions`, 'success');
                
            } catch (error) {
                console.error("Ledger Error:", error);
                showToast('Error loading ledger: ' + error.message, 'error');
            } finally {
                showLoading(false);
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }
        
        function exportToCSV() {
            const rows = document.querySelectorAll('#ledgerTableBody tr');
            if (rows.length <= 1) {
                showToast('No data to export', 'error');
                return;
            }
            
            const currentDate = new Date().toISOString().slice(0,19).replace(/:/g, '-');
            let csvRows = [];
            
            // Header
            csvRows.push('"Date","Transaction Type","Description","Amount (TK)","Balance (TK)"');
            
            // Get all transaction rows (excluding the last summary row)
            for (let i = 0; i < rows.length - 1; i++) {
                const row = rows[i];
                const cells = row.querySelectorAll('td');
                if (cells.length === 5) {
                    let date = cells[0].textContent.trim();
                    let typeElem = cells[1].querySelector('span');
                    let type = typeElem ? typeElem.innerText.trim() : cells[1].textContent.trim();
                    let description = cells[2].textContent.trim();
                    let amountRaw = cells[3].textContent.trim();
                    let balanceRaw = cells[4].textContent.trim();
                    
                    let amountMatch = amountRaw.match(/([\d.]+)/);
                    let amount = amountMatch ? amountMatch[0] : '0';
                    
                    let balanceMatch = balanceRaw.match(/([\d.]+)/);
                    let balance = balanceMatch ? balanceMatch[0] : '0';
                    
                    csvRows.push(`"${date}","${type}","${description}","${amount}","${balance}"`);
                }
            }
            
            // Add closing balance row
            csvRows.push('"","","","",""');
            csvRows.push(`"Closing Balance","","","${currentClosingBalance.toFixed(2)}","${currentClosingBalance.toFixed(2)}"`);
            
            const blob = new Blob(["\uFEFF" + csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ledger_${currentCustomerName}_${currentDate}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('CSV exported successfully with closing balance', 'success');
        }
        
        function printLedger() {
            window.print();
        }
        
        // Event listeners
        document.getElementById('viewLedgerBtn').addEventListener('click', viewLedger);
        document.getElementById('exportBtn').addEventListener('click', exportToCSV);
        document.getElementById('printBtn').addEventListener('click', printLedger);
        document.getElementById('refreshBtn').addEventListener('click', () => location.reload());
        document.getElementById('darkModeToggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            document.body.classList.toggle('dark');
        });
        document.getElementById('menuToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
        });
        document.getElementById('logoutLink').addEventListener('click', (e) => {
            e.preventDefault();
            logout();
        });
        
        // Set default dates
        const today = new Date();
        const thirtyDaysAgo = new Date();
        thirtyDaysAgo.setDate(today.getDate() - 30);
        document.getElementById('startDate').value = thirtyDaysAgo.toISOString().split('T')[0];
        document.getElementById('endDate').value = today.toISOString().split('T')[0];
        
        loadCustomers();
    </script>
</body>
</html>
