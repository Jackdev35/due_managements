<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Customer Ledger - Elias Computer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Ledger Page Styles */
        .filter-section {
            background: var(--card-bg);
            border-radius: 0.75rem;
            padding: 1rem;
            border: 1px solid var(--border);
            margin-bottom: 1rem;
        }
        
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            align-items: end;
        }
        
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        
        .filter-group label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .filter-group select,
        .filter-group input {
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            background: var(--card-bg);
            color: var(--text-primary);
            font-size: 0.85rem;
        }
        
        .btn-view {
            background: var(--accent);
            padding: 0.5rem 1.25rem;
            height: 38px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            justify-content: center;
        }
        
        .customer-info-card {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
            border-radius: 0.75rem;
            padding: 1rem;
            margin-bottom: 1rem;
            color: white;
            display: none;
        }
        
        .ledger-card {
            background: var(--card-bg);
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            overflow: hidden;
            display: none;
        }
        
        .ledger-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        
        .ledger-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .ledger-actions button {
            padding: 0.4rem 0.75rem;
            font-size: 0.75rem;
            background: var(--bg);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }
        
        .ledger-table-container {
            overflow-x: auto;
            max-height: 500px;
            overflow-y: auto;
        }
        
        .ledger-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }
        
        .ledger-table th {
            background: var(--bg);
            padding: 0.75rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        
        .ledger-table td {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border-light);
        }
        
        .ledger-table tr:hover {
            background: var(--bg);
        }
        
        .transaction-type {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.25rem 0.5rem;
            border-radius: 0.375rem;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        .transaction-type.due {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }
        
        .transaction-type.collection {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }
        
        .amount-due {
            color: #ef4444;
            font-weight: 600;
        }
        
        .amount-collection {
            color: #10b981;
            font-weight: 600;
        }
        
        .balance-positive {
            color: #ef4444;
            font-weight: 700;
        }
        
        .empty-ledger {
            text-align: center;
            padding: 3rem;
        }
        
        .empty-ledger i {
            font-size: 3rem;
            opacity: 0.3;
            margin-bottom: 1rem;
        }
        
        .debug-info {
            background: var(--bg);
            border-radius: 0.5rem;
            padding: 0.5rem;
            margin-top: 0.5rem;
            font-size: 0.7rem;
            font-family: monospace;
            display: none;
        }
        
        @media (max-width: 768px) {
            .filter-grid {
                grid-template-columns: 1fr;
            }
            
            .ledger-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .ledger-actions {
                width: 100%;
            }
            
            .ledger-actions button {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-laptop-code"></i>
                <span>Elias Computer</span>
            </div>
            <nav>
                <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                <a href="customers.html"><i class="fas fa-users"></i> Customers</a>
                <a href="due-entry.html"><i class="fas fa-plus-circle"></i> Due Entry</a>
                <a href="collection.html"><i class="fas fa-hand-holding-usd"></i> Collection</a>
                <a href="ledger.html" class="active"><i class="fas fa-book"></i> Customer Ledger</a>
                <a href="#" id="logoutLink"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </div>
        
        <div class="main-content">
            <div class="top-header">
                <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                <h2><i class="fas fa-book"></i> Customer Ledger</h2>
                <div style="display: flex; gap: 0.5rem;">
                    <button id="refreshBtn" style="background: transparent;"><i class="fas fa-sync-alt"></i></button>
                    <button id="darkModeToggle" style="background: transparent;"><i class="fas fa-moon"></i></button>
                </div>
            </div>
            
            <div class="filter-section">
                <div class="filter-grid">
                    <div class="filter-group">
                        <label><i class="fas fa-user"></i> Select Customer</label>
                        <select id="customerSelect">
                            <option value="">-- Select Customer --</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label><i class="fas fa-calendar"></i> Start Date</label>
                        <input type="date" id="startDate">
                    </div>
                    <div class="filter-group">
                        <label><i class="fas fa-calendar"></i> End Date</label>
                        <input type="date" id="endDate">
                    </div>
                    <div class="filter-group">
                        <button id="viewLedgerBtn" class="btn-view">
                            <i class="fas fa-eye"></i> View Ledger
                        </button>
                    </div>
                </div>
            </div>
            
            <div id="customerInfoCard" class="customer-info-card" style="display: none;">
                <h3><i class="fas fa-user-circle"></i> <span id="customerName"></span></h3>
                <div style="display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 0.5rem;">
                    <div><small>📞</small> <span id="customerPhone"></span></div>
                    <div><small>📍</small> <span id="customerAddress"></span></div>
                    <div><small>💰 Due:</small> <strong id="customerCurrentDue"></strong></div>
                </div>
            </div>
            
            <div id="ledgerCard" class="ledger-card" style="display: none;">
                <div class="ledger-header">
                    <h3><i class="fas fa-history"></i> Transaction History</h3>
                    <div class="ledger-actions">
                        <button id="exportBtn"><i class="fas fa-download"></i> CSV</button>
                        <button id="printBtn"><i class="fas fa-print"></i> Print</button>
                    </div>
                </div>
                <div class="ledger-table-container">
                    <table class="ledger-table">
                        <thead>
                            <tr><th>Date</th><th>Type</th><th>Description</th><th>Amount</th><th>Balance</th></tr>
                        </thead>
                        <tbody id="ledgerTableBody">
                            <tr><td colspan="5" class="empty-ledger">Select a customer to view ledger</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <div id="loadingOverlay" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 9999;">
        <div style="background: var(--card-bg); padding: 1.5rem; border-radius: 1rem;">
            <i class="fas fa-spinner fa-pulse" style="font-size: 2rem;"></i>
            <p>Loading...</p>
        </div>
    </div>
    
    <script type="module">
        import { checkAuthState, logout } from './js/auth.js';
        import { db, collection, getDocs, query, where, orderBy, getDoc, doc } from './js/firebase.js';
        
        checkAuthState();
        
        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }
        
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Load customers
        async function loadCustomers() {
            try {
                const customersSnap = await getDocs(collection(db, 'customers'));
                const select = document.getElementById('customerSelect');
                select.innerHTML = '<option value="">-- Select Customer --</option>';
                
                customersSnap.forEach(docSnap => {
                    const customer = docSnap.data();
                    const option = document.createElement('option');
                    option.value = docSnap.id;
                    option.textContent = `${customer.name} - Due: ৳${(customer.totalDue || 0).toFixed(2)}`;
                    select.appendChild(option);
                });
                
                if (customersSnap.size === 0) {
                    select.innerHTML = '<option value="">-- No customers found. Add one first --</option>';
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('Error loading customers', 'error');
            }
        }
        
        // Main function to view ledger
        async function viewLedger() {
            const customerId = document.getElementById('customerSelect').value;
            
            if (!customerId) {
                showToast('Please select a customer', 'error');
                return;
            }
            
            showLoading(true);
            
            try {
                // Get customer info
                const customerRef = doc(db, 'customers', customerId);
                const customerDoc = await getDoc(customerRef);
                
                if (!customerDoc.exists()) {
                    showToast('Customer not found', 'error');
                    showLoading(false);
                    return;
                }
                
                const customer = customerDoc.data();
                
                // Show customer info
                document.getElementById('customerName').textContent = customer.name;
                document.getElementById('customerPhone').textContent = customer.phone || 'N/A';
                document.getElementById('customerAddress').textContent = customer.address || 'N/A';
                document.getElementById('customerCurrentDue').innerHTML = `৳${(customer.totalDue || 0).toFixed(2)}`;
                document.getElementById('customerInfoCard').style.display = 'block';
                
                // Get ALL transactions for this customer (no date filter first for testing)
                const transactionsQuery = query(
                    collection(db, 'transactions'),
                    where('customerId', '==', customerId),
                    orderBy('date', 'asc')
                );
                
                const transactionsSnap = await getDocs(transactionsQuery);
                
                console.log("Transactions found:", transactionsSnap.size);
                console.log("Customer ID:", customerId);
                
                // Log each transaction for debugging
                transactionsSnap.forEach(docSnap => {
                    console.log("Transaction:", docSnap.data());
                });
                
                const tbody = document.getElementById('ledgerTableBody');
                tbody.innerHTML = '';
                
                if (transactionsSnap.empty) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="5" class="empty-ledger">
                                <i class="fas fa-receipt"></i>
                                <p>No transactions found for this customer</p>
                                <small>Add a Due Entry or Collection first</small>
                            </td>
                        </tr>
                    `;
                    document.getElementById('ledgerCard').style.display = 'block';
                    showLoading(false);
                    return;
                }
                
                let balance = 0;
                let totalDue = 0;
                let totalCollection = 0;
                
                // Process each transaction
                for (const docSnap of transactionsSnap.docs) {
                    const trans = docSnap.data();
                    let description = '';
                    let amount = 0;
                    let amountHtml = '';
                    let typeHtml = '';
                    
                    if (trans.type === 'due') {
                        description = `${trans.productName || 'Product'} (Qty: ${trans.qty || 1})`;
                        amount = trans.dueAmount || 0;
                        balance += amount;
                        totalDue += amount;
                        amountHtml = `<span class="amount-due">+ ৳${amount.toFixed(2)}</span>`;
                        typeHtml = `<span class="transaction-type due"><i class="fas fa-plus-circle"></i> Due Added</span>`;
                    } else if (trans.type === 'collection') {
                        description = `Payment received - ${trans.remarks || 'No remarks'}`;
                        amount = trans.collectionAmount || 0;
                        balance -= amount;
                        totalCollection += amount;
                        amountHtml = `<span class="amount-collection">- ৳${amount.toFixed(2)}</span>`;
                        typeHtml = `<span class="transaction-type collection"><i class="fas fa-hand-holding-usd"></i> Collection</span>`;
                    } else {
                        continue;
                    }
                    
                    const row = tbody.insertRow();
                    row.innerHTML = `
                        <td>${trans.date || 'N/A'}</td>
                        <td>${typeHtml}</td>
                        <td>${escapeHtml(description)}</td>
                        <td>${amountHtml}</td>
                        <td class="balance-positive">৳${balance.toFixed(2)}</td>
                    `;
                }
                
                // Show summary in console
                console.log("Summary - Total Due:", totalDue, "Total Collection:", totalCollection, "Balance:", balance);
                
                document.getElementById('ledgerCard').style.display = 'block';
                
                if (tbody.children.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty-ledger">No valid transactions</td></tr>';
                }
                
            } catch (error) {
                console.error("Error details:", error);
                showToast('Error: ' + error.message, 'error');
                
                const tbody = document.getElementById('ledgerTableBody');
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="empty-ledger">
                            <i class="fas fa-exclamation-triangle"></i>
                            <p>Error loading data: ${error.message}</p>
                            <small>Check console for details</small>
                        </td>
                    </tr>
                `;
                document.getElementById('ledgerCard').style.display = 'block';
            } finally {
                showLoading(false);
            }
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Export CSV
        function exportToCSV() {
            const rows = document.querySelectorAll('#ledgerTableBody tr');
            if (rows.length === 0 || rows[0].querySelector('td[colspan]')) {
                showToast('No data to export', 'error');
                return;
            }
            
            let csv = 'Date,Transaction Type,Description,Amount,Balance\n';
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length === 5) {
                    const date = cells[0].textContent.trim();
                    let type = cells[1].textContent.trim();
                    const description = cells[2].textContent.trim();
                    let amount = cells[3].textContent.trim();
                    let balance = cells[4].textContent.trim();
                    
                    type = type.replace('Due Added', 'Due').replace('Collection', 'Collection');
                    amount = amount.replace('+', '').replace('-', '').trim();
                    
                    csv += `"${date}","${type}","${description}","${amount}","${balance}"\n`;
                }
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ledger_${Date.now()}.csv`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('Exported successfully', 'success');
        }
        
        function printLedger() {
            window.print();
        }
        
        // Event listeners
        document.getElementById('viewLedgerBtn').addEventListener('click', viewLedger);
        document.getElementById('exportBtn').addEventListener('click', exportToCSV);
        document.getElementById('printBtn').addEventListener('click', printLedger);
        document.getElementById('refreshBtn').addEventListener('click', () => {
            document.getElementById('customerSelect').value = '';
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';
            document.getElementById('ledgerCard').style.display = 'none';
            document.getElementById('customerInfoCard').style.display = 'none';
            loadCustomers();
        });
        document.getElementById('darkModeToggle').addEventListener('click', () => document.body.classList.toggle('dark'));
        document.getElementById('menuToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));
        document.getElementById('logoutLink').addEventListener('click', (e) => { e.preventDefault(); logout(); });
        
        // Initialize
        loadCustomers();
    </script>
</body>
</html>
